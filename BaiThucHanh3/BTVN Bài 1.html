<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đăng Ký</title>

<style>

body{
font-family: Arial;
margin:40px;
width:400px;
}

label{
display:block;
margin-top:10px;
}

input{
width:100%;
padding:6px;
margin-top:5px;
}

.error{
color:red;
font-size:13px;
display:none;
}

.invalid{
border:1px solid red;
}

.valid{
border:1px solid green;
}

.success{
color:green;
font-weight:bold;
margin-top:20px;
}

/* password strength */
.strength{
height:6px;
background:#ddd;
margin-top:5px;
}

.strength-bar{
height:6px;
width:0%;
}

.char-count{
font-size:12px;
color:gray;
text-align:right;
}

.password-wrapper{
position:relative;
}

.toggle{
position:absolute;
right:10px;
top:8px;
cursor:pointer;
}

</style>
</head>

<body>

<h2>Đăng ký tài khoản</h2>

<form id="registerForm">

<label>Họ và tên</label>
<input type="text" id="fullname" maxlength="50">
<div class="char-count">
<span id="count">0</span>/50
</div>

<label>Email</label>
<input type="text" id="email">

<label>Số điện thoại</label>
<input type="text" id="phone">

<label>Mật khẩu</label>

<div class="password-wrapper">
<input type="password" id="password">
<span class="toggle" id="togglePass">👁</span>
</div>

<div class="strength">
<div id="strengthBar" class="strength-bar"></div>
</div>

<label>Xác nhận mật khẩu</label>
<input type="password" id="confirm">

<p>Giới tính</p>
<label><input type="radio" name="gender" value="Nam"> Nam</label>
<label><input type="radio" name="gender" value="Nữ"> Nữ</label>

<br>

<label>
<input type="checkbox" id="terms"> Tôi đồng ý với điều khoản
</label>

<br><br>

<button type="submit">Đăng ký</button>

</form>

<div id="success" class="success"></div>

<script src="script.js"></script>

</body>
</html>
